name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      DOCKERHUB_REPO: ${{ vars.DOCKERHUB_REPO }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate Docker Hub configuration
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_REPO}" ]; then
            echo "Repository variable DOCKERHUB_REPO is required"
            exit 1
          fi
          case "${DOCKERHUB_REPO}" in
            */*) ;;
            *)
              echo "DOCKERHUB_REPO must use namespace/repository format"
              exit 1
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate build metadata
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}

      - name: Generate release notes
        run: |
          set -euo pipefail
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"
          if [ -n "${previous_tag}" ]; then
            range="${previous_tag}..${current_tag}"
          else
            range="${current_tag}"
          fi

          : > release-notes.md
          printf 'Docker image: `%s:%s`\n\n' "${DOCKERHUB_REPO}" "${current_tag}" >> release-notes.md
          printf '[Docker Hub](https://hub.docker.com/r/router-for-me/cli-proxy-api)\n' >> release-notes.md
          git log --pretty=format:'- %h %s' "${range}" >> release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
